{{- $src := urls.RelURL (.Get "src") -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $max_width := .Get "max-width" | default "400px" -}}
{{- $bg := .Get "bg" | default "#ffffff" -}}
<div style="background: {{ $bg }}; display: inline-block; padding: 1.5rem 2rem; border-radius: 8px; margin: 0.5rem 0; border: 1px solid #ddd;">
<img src="{{ $src }}" alt="{{ $alt }}" style="max-width: {{ $max_width }}; display: block;">
</div>
